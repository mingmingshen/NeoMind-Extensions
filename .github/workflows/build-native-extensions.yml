name: Build Native Extensions

on:
  push:
    branches: [main]
    paths:
      - 'extensions/image-analyzer/**'
      - 'extensions/yolo-video/**'
      - '.github/workflows/build-native-extensions.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NEOMIND_REPO: 'camthink-ai/NeoMind'

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon)
          - os: macos-latest
            extension: image-analyzer
            target: aarch64-apple-darwin
          - os: macos-latest
            extension: yolo-video
            target: aarch64-apple-darwin

          # Linux (x86_64)
          - os: ubuntu-latest
            extension: image-analyzer
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            extension: yolo-video
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout extension repo
        uses: actions/checkout@v4

      - name: Checkout NeoMind core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEOMIND_REPO }}
          path: neomind

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip jq pkg-config \
            libssl-dev libglib2.0-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zip jq

      - name: Build native extension
        shell: bash
        run: |
          set -e

          EXT="${{ matrix.extension }}"
          echo "======================================"
          echo "Building $EXT for ${{ matrix.target }}"
          echo "======================================"

          # Create symlinks for neomind-core
          ln -sf "$(pwd)/neomind/crates/neomind-core" "neomind-core-symlink"

          cd "extensions/$EXT"

          # Create a temporary workspace Cargo.toml
          cat > Cargo.toml.tmp << 'EOF'
          [workspace]
          resolver = "2"
          members = ["."]

          [workspace.dependencies]
          # From neomind-core workspace
          async-trait = "0.1"
          chrono = "0.4"
          semver = "1.0"
          thiserror = "2.0"
          tokio = { version = "1", features = ["full"] }
          once_cell = "1.19"
          serde = { version = "1.0", features = ["derive"] }
          serde_json = "1.0"
          EOF

          # Create .cargo/config.toml for local dependencies
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [patch.crates-io]
          neomind-core = { path = "../../../neomind-core-symlink" }
          EOF

          echo "Building $EXT..."
          cargo build --release 2>&1 | tee build.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed!"
            tail -50 build.log
            exit 1
          fi

          # Go back to root
          cd ../..

          # Find the built library
          LIB_NAME=$(grep -A2 '^\[lib\]' "extensions/$EXT/Cargo.toml" | grep 'name' | head -1 | cut -d'"' -f2 || true)
          if [ -z "$LIB_NAME" ]; then
            LIB_NAME=$(grep '^name = ' "extensions/$EXT/Cargo.toml" | cut -d'"' -f2 | tr '-' '_')
          fi

          echo "Library name: $LIB_NAME"

          # Determine extension based on platform
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            EXT_LIB="lib${LIB_NAME}.dylib"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            EXT_LIB="${LIB_NAME}.dll"
          else
            EXT_LIB="lib${LIB_NAME}.so"
          fi

          echo "Looking for: $EXT_LIB"

          # Find the built library (in target/release, not target/<triple>/release)
          BUILT_LIB=$(find "extensions/$EXT/target/release" -name "$EXT_LIB" 2>/dev/null | head -1)

          if [ -z "$BUILT_LIB" ]; then
            echo "Error: Library not found"
            find "extensions/$EXT/target" -type f -name "*.dylib" -o -name "*.so" -o -name "*.dll" || true
            exit 1
          fi

          echo "Found library: $BUILT_LIB"

          # Create output directory
          mkdir -p "dist/${{ matrix.extension }}"

          # Copy library to output
          cp "$BUILT_LIB" "dist/${{ matrix.extension}}/"

          # Create manifest
          cp "extensions/$EXT/manifest.json" "dist/${{ matrix.extension}}/"

          # Copy frontend if exists
          if [ -d "extensions/$EXT/frontend" ]; then
            cp -r "extensions/$EXT/frontend" "dist/${{ matrix.extension}}/"
          fi

          # Build .nep package
          cd "dist/${{ matrix.extension }}"
          PACKAGE_NAME="${{ matrix.extension }}-0.1.0-${{ matrix.target }}.nep"
          zip -qr "../../$PACKAGE_NAME" .
          cd ../..

          echo "✓ Built: $PACKAGE_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nep-native-${{ matrix.extension }}-${{ runner.os }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build-native
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nep-native-*

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="0.1.0"

          cat > /tmp/release_notes.md << 'EOF'
          NeoMind Native Extension Packages v0.1.0

          ## Native Extensions

          | Extension | Platform | Size |
          |-----------|----------|------|
          | **image-analyzer** | macOS (ARM64), Linux (x64) | ~8MB |
          | **yolo-video** | macOS (ARM64), Linux (x64) | ~8MB |

          ## Installation
          Via NeoMind Web UI or API:
          curl -X POST http://localhost:9375/api/extensions/upload/file \
            -H 'Content-Type: application/octet-stream' \
            --data-binary @package.nep
          EOF

          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION exists, uploading packages..."
          else
            gh release create "v$VERSION" \
              --title "Native Extension Packages v$VERSION" \
              --notes-file /tmp/release_notes.md
          fi

          # Upload packages
          for nep in dist/**/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Done!"
