name: Build Native Extensions

on:
  push:
    branches: [main]
    paths:
      - 'extensions/image-analyzer/**'
      - 'extensions/yolo-video/**'
      - '.github/workflows/build-native-extensions.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NEOMIND_REPO: 'camthink-ai/NeoMind'

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon)
          - os: macos-latest
            extension: image-analyzer
            target: aarch64-apple-darwin
          - os: macos-latest
            extension: yolo-video
            target: aarch64-apple-darwin

          # Linux (x86_64)
          - os: ubuntu-latest
            extension: image-analyzer
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            extension: yolo-video
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout extension repo
        uses: actions/checkout@v4
        with:
          path: extensions

      - name: Checkout NeoMind core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEOMIND_REPO }}
          path: neomind

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip jq pkg-config \
            libssl-dev libglib2.0-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zip jq

      - name: Build native extension
        shell: bash
        run: |
          set -e

          EXT="${{ matrix.extension }}"
          echo "======================================"
          echo "Building $EXT for ${{ matrix.target }}"
          echo "======================================"

          # Set up Cargo workspace
          cat > Cargo.toml << 'EOF'
          [workspace]
          resolver = "2"
          members = ["extensions/$EXT"]
          EOF

          # Create a local neomind-core dependency
          ln -sf "$(pwd)/neomind/crates/neomind-core" "neomind-core"

          # Update extension's Cargo.toml to use local neomind-core
          cd "extensions/$EXT"

          # Use [patch.crates-io] to redirect neomind-core dependency
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [build]
          target = "${{ matrix.target }}"

          [net]
          git-fetch-with-cli = true

          [patch.crates-io]
          neomind-core = { path = "../../../neomind-core" }
          EOF

          # Build the extension
          echo "Building $EXT..."
          cargo build --release --target "${{ matrix.target }}"

          # Find the built library
          cd "../../.."
          LIB_NAME=$(grep -A2 '^\[lib\]' "extensions/$EXT/Cargo.toml" | grep 'name' | head -1 | cut -d'"' -f2 || echo "")
          if [ -z "$LIB_NAME" ]; then
            # Try package name
            LIB_NAME=$(grep '^name = ' "extensions/$EXT/Cargo.toml" | cut -d'"' -f2 | tr '-' '_')
          fi

          echo "Library name: $LIB_NAME"

          # Determine extension based on platform
          if [[ "${{ matrix.target }}" == *"apple"* ]]; then
            EXT_LIB="lib${LIB_NAME}.dylib"
          elif [[ "${{ matrix.target }}" == *"windows"* ]]; then
            EXT_LIB="${LIB_NAME}.dll"
          else
            EXT_LIB="lib${LIB_NAME}.so"
          fi

          # Find the built library
          BUILT_LIB=$(find "extensions/$EXT/target/${{ matrix.target }}/release" -name "$EXT_LIB" -o -name "${LIB_NAME}.dylib" -o -name "${LIB_NAME}.so" 2>/dev/null | head -1)

          if [ -z "$BUILT_LIB" ]; then
            echo "Error: Library not found"
            find "extensions/$EXT/target" -name "*.dylib" -o -name "*.so" -o -name "*.dll" || true
            exit 1
          fi

          echo "Found library: $BUILT_LIB"

          # Create output directory
          mkdir -p "dist/${{ matrix.extension }}"

          # Copy library to output
          cp "$BUILT_LIB" "dist/${{ matrix.extension}}/"

          # Create manifest
          cp "extensions/$EXT/manifest.json" "dist/${{ matrix.extension}}/"

          # Copy frontend if exists
          if [ -d "extensions/$EXT/frontend" ]; then
            cp -r "extensions/$EXT/frontend" "dist/${{ matrix.extension}}/"
          fi

          # Build .nep package
          cd "dist/${{ matrix.extension }}"
          PACKAGE_NAME="${{ matrix.extension }}-0.1.0-${{ matrix.target }}.nep"
          zip -qr "../../$PACKAGE_NAME" .
          cd ../..

          echo "✓ Built: $PACKAGE_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nep-native-${{ matrix.extension }}-${{ runner.os }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build-native
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nep-native-*

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="0.1.0"

          cat > /tmp/release_notes.md << 'EOF'
          NeoMind Native Extension Packages v0.1.0

          ## Native Extensions

          | Extension | Platform | Size |
          |-----------|----------|------|
          | **image-analyzer** | macOS (ARM64), Linux (x64) | ~8MB |
          | **yolo-video** | macOS (ARM64), Linux (x64) | ~8MB |

          ## Installation
          Via NeoMind Web UI or API:
          curl -X POST http://localhost:9375/api/extensions/upload/file \
            -H 'Content-Type: application/octet-stream' \
            --data-binary @package.nep
          EOF

          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION exists, uploading packages..."
          else
            gh release create "v$VERSION" \
              --title "Native Extension Packages v$VERSION" \
              --notes-file /tmp/release_notes.md
          fi

          # Upload packages
          for nep in dist/**/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Done!"
