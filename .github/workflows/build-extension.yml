name: Build Extension

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension name'
        required: true
        default: 'weather-forecast-v2'
        type: choice
        options:
          - weather-forecast-v2
          - image-analyzer-v2
          - yolo-video-v2
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NEOMIND_REPO: 'camthink-ai/NeoMind'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS platforms
          # Use macos-latest for ARM, cross-compile for x86_64
          - os: macos-latest
            platform: darwin_aarch64
            target: aarch64-apple-darwin
          - os: macos-latest
            platform: darwin_x86_64
            target: x86_64-apple-darwin
          # Linux platforms
          - os: ubuntu-latest
            platform: linux_amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            platform: linux_arm64
            target: aarch64-unknown-linux-gnu
          # Windows platform
          - os: windows-latest
            platform: windows_amd64
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout extension repo
        uses: actions/checkout@v4

      - name: Checkout NeoMind core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEOMIND_REPO }}
          path: NeoMind

      - name: Setup workspace structure
        run: |
          # Move NeoMind to parent directory to match Cargo.toml paths
          mv NeoMind ../NeoMind

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zip jq

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build extension
        run: |
          EXT="${{ inputs.extension }}"
          echo "Building: $EXT"
          chmod +x build.sh
          ./build.sh --yes --skip-install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nep-${{ inputs.extension }}-${{ matrix.platform }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.release == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nep-${{ inputs.extension }}-*
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="2.0.0"
          EXT="${{ inputs.extension }}"

          if gh release view "v$VERSION" &>/dev/null; then
            echo "Uploading to existing release v$VERSION"
          else
            gh release create "v$VERSION" \
              --title "NeoMind Extensions V2" \
              --notes "NeoMind Extension Packages V2 (ABI Version 3)"
          fi

          for nep in dist/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Done!"
