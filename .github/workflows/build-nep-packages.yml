name: Build .nep Packages

on:
  push:
    branches: [main]
    paths:
      - 'extensions/weather-forecast/**'
      - 'scripts/package.sh'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: wasm
          - os: macos-latest
            platform: wasm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zip jq

      - name: Build WASM package
        run: |
          make package-weather-forecast

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nep-packages-wasm-${{ runner.os }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build-wasm
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nep-packages-*
          merge-multiple: false

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="0.1.0"

          # Create release notes
          cat > /tmp/release_notes.md << 'EOF'
          NeoMind Extension Packages v0.1.0

          ## WASM Extension
          - **weather-forecast** - Real-time weather data (cross-platform)

          Note: Native extensions (image-analyzer, yolo-video) require local build.

          ## Installation
          Via NeoMind Web UI or API:
          curl -X POST http://localhost:9375/api/extensions/upload/file -H 'Content-Type: application/octet-stream' --data-binary @package.nep
          EOF

          # Create or update release
          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION exists, uploading packages..."
          else
            echo "Creating release v$VERSION..."
            gh release create "v$VERSION" \
              --title "Extension Packages v$VERSION" \
              --notes-file /tmp/release_notes.md
          fi

          # Upload packages
          for nep in dist/*.nep dist/**/**/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Packages uploaded to release v$VERSION"
