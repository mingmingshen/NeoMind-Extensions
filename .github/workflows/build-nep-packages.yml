name: Build .nep Packages

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'scripts/package.sh'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_amd64
          - os: macos-latest
            platform: darwin_aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Setup symlink for neomind-core
        run: |
          # Git submodule is checked out at NeoMind/
          # Create symlink for ../NeoMind (expected by Cargo.toml)
          ln -s NeoMind ../NeoMind

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zip jq

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install zip -y

      - name: Build packages
        run: |
          make package-all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nep-packages-${{ matrix.platform }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to dist
        run: |
          mkdir -p dist
          find artifacts -name "*.nep" -exec cp {} dist \;

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="0.1.0"

          # Create release notes
          cat > /tmp/release_notes.md << 'EOF'
          NeoMind Extension Packages v0.1.0

          ## Extensions
          - **image-analyzer** - Object detection and image analysis
          - **weather-forecast** - Real-time weather data (WASM)
          - **yolo-video** - Video stream processing with YOLO detection

          ## Installation
          Via NeoMind Web UI or API:
          curl -X POST http://localhost:9375/api/extensions/upload/file -H 'Content-Type: application/octet-stream' --data-binary @package.nep
          EOF

          # Create or update release
          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION exists, uploading packages..."
          else
            echo "Creating release v$VERSION..."
            gh release create "v$VERSION" \
              --title "Extension Packages v$VERSION" \
              --notes-file /tmp/release_notes.md
          fi

          # Upload packages
          for nep in dist/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Packages uploaded to release v$VERSION"
